version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: investai-postgres
    restart: always
    environment:
      POSTGRES_USER: investai
      POSTGRES_PASSWORD: investai123
      POSTGRES_DB: investai
    ports:
      - "5435:5432"
    volumes:
      - inscesteai_investai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U investai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: investai-redis
    restart: always
    command: redis-server --requirepass investai_redis_2026
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  inscesteai_investai_pgdata:
    external: true
